<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Birthday Surprise</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: linear-gradient(#6a0dad, #8a2be2);
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
      }

      button {
        background: #8a2be2;
        color: white;
        font-size: 24px;
        padding: 20px 40px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 0 15px #d8b4fe;
        animation: glow 2s infinite alternate;
      }
      @keyframes glow {
        0% {
          box-shadow: 0 0 10px #d8b4fe;
        }
        100% {
          box-shadow: 0 0 25px #f5b3ff;
        }
      }
      button:hover {
        animation: shake 0.5s;
      }
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }

      #content {
        display: none;
        text-align: center;
        position: relative;
      }

      img {
        width: 250px;
        border-radius: 20px;
        margin-top: 20px;
        opacity: 0;
        transition: 1s;
      }

      #cake {
        width: 200px;
        margin-top: 20px;
      }

      #message {
        position: absolute;
        bottom: -200px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 20px;
        line-height: 1.4;
        animation: moveUp 12s linear forwards;
        white-space: pre-line;
      }

      @keyframes moveUp {
        0% {
          bottom: -200px;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          bottom: 110%;
          opacity: 0;
        }
      }

      #topText {
        position: absolute;
        top: 20px;
        font-size: 40px;
        font-weight: bold;
        opacity: 0;
        animation: fadeIn 1.5s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <canvas id="confetti-canvas"></canvas>

    <button onclick="start()">ادخلي برجلك اليمين يا مزه</button>

    <div id="content">
      <div id="topText">Happy Birthday 🎉</div>

      <!-- استخدم الاسم الرقمي الطويل هنا -->
      <img id="girl" src="1772711774642.png" />

      <img id="cake" src="cake.png" />

      <div id="message">
        كل عام وانتي في صحه وسعاده واتمني ليك كل الخير ويارب تتهني في حياتك
        وتكون بداية افراحك ونهاية احزانك
      </div>

      <audio id="song" src="birthday.mp3"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
      let girl = document.getElementById("girl");
      let topText = document.getElementById("topText");

      function start() {
        document.querySelector("button").style.display = "none";
        document.getElementById("content").style.display = "block";

        document.getElementById("song").play();

        setTimeout(() => {
          girl.style.opacity = 1;
        }, 500);
        setTimeout(() => {
          topText.style.opacity = 1;
        }, 0);

        setInterval(() => {
          confetti({
            particleCount: 5,
            spread: 70,
            origin: { y: 0.6 },
          });
        }, 200);
      }
    </script>
  </body>
</html>
